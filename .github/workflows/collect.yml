name: collect-oil-news-events

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-oil-news-events
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: sqlite:///energy_events.db
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CLUSTER_WINDOW_MINUTES: "60"
      SIMILARITY_THRESHOLD: "0.74"
      CANDIDATE_SOURCES: "2"
      CANDIDATE_WINDOW_MINUTES: "5"
      CONFIRMED_SOURCES: "3"
      CONFIRMED_WINDOW_MINUTES: "15"
      STRONG_SOURCES: "4"
      STRONG_WINDOW_MINUTES: "30"
      RESEARCH_WINDOW_MINUTES: "60"
      DISPLAY_TIMEZONE: "America/New_York"
      MAX_ENTRIES_PER_FEED: "40"
      KEYWORD_FILTER: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one collection cycle
        run: python app/collector.py

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add energy_events.db || true
          if git diff --cached --quiet; then
            echo "No DB changes"
          else
            git commit -m "update oil event database"
            git pull --rebase origin main
            git push
          fi
